---
# Policy 1: deny-all-default
# Default deny CiliumNetworkPolicy for the employee-portal namespace.
# All ingress and egress is blocked unless explicitly permitted by
# subsequent CiliumNetworkPolicy resources below.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: deny-all-default
  namespace: employee-portal
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
  annotations:
    description: >-
      Default deny-all policy implementing zero-trust networking for the
      employee-portal namespace. All traffic is denied unless explicitly
      permitted by other CiliumNetworkPolicy resources in this namespace.
spec:
  description: "Default deny all ingress and egress for employee-portal namespace"
  endpointSelector: {}
  ingress:
    - {}
  egress:
    - {}

---
# Policy 2: allow-dns
# Allows all pods in employee-portal to perform DNS lookups via kube-dns.
# This is foundational — without DNS, pods cannot resolve service names.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns
  namespace: employee-portal
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
  annotations:
    description: "Allows all pods in employee-portal to egress to kube-dns on port 53 (UDP/TCP)."
spec:
  description: "Allow DNS egress to kube-dns for all pods in employee-portal"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"

---
# Policy 3: allow-ingress-to-frontend
# Allows the ingress-nginx controller to send traffic to frontend pods on port 80.
# Also allows port 3000 in case the frontend runs on a non-standard port.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: employee-portal
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
  annotations:
    description: "Allows ingress-nginx controller pods to send HTTP traffic to frontend pods."
spec:
  description: "Allow ingress from ingress-nginx controller to frontend pods"
  endpointSelector:
    matchLabels:
      app: frontend
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
            app.kubernetes.io/name: ingress-nginx
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "3000"
              protocol: TCP

---
# Policy 4: allow-frontend-to-backend
# Allows frontend pods to make API calls to backend pods on port 8080.
# L7 HTTP policy is included to enforce only specific HTTP methods
# for defense-in-depth (comment out the rules section if L7 is not needed).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: employee-portal
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
  annotations:
    description: "Allows frontend pods to communicate with backend pods on port 8080."
spec:
  description: "Allow HTTP traffic from frontend to backend on port 8080"
  endpointSelector:
    matchLabels:
      app: backend
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: frontend
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/api/.*"
              - method: "POST"
                path: "/api/.*"
              - method: "PUT"
                path: "/api/.*"
              - method: "DELETE"
                path: "/api/.*"
              - method: "OPTIONS"
                path: "/.*"

---
# Policy 5: allow-backend-to-postgres
# Allows backend pods to connect to postgres on port 5432 (PostgreSQL).
# This uses L4 policy only since Cilium cannot inspect PostgreSQL wire protocol
# without additional parser support.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-backend-to-postgres
  namespace: employee-portal
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
  annotations:
    description: "Allows backend pods to connect to postgres pods on port 5432."
spec:
  description: "Allow PostgreSQL traffic from backend to postgres on port 5432"
  endpointSelector:
    matchLabels:
      app: postgres
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: backend
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

---
# Policy: allow-ingress-to-backend
# Allows the ingress-nginx controller to send traffic to backend pods on port 8080.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-to-backend
  namespace: employee-portal
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
  annotations:
    description: "Allows ingress-nginx controller pods to send HTTP traffic to backend pods."
spec:
  description: Allow ingress from ingress-nginx controller to backend pods on port 8080
  endpointSelector:
    matchLabels:
      app: backend
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: ingress-nginx
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP

---
# Egress companion policies
# These are required in addition to the ingress rules above because
# Cilium enforces policy on both the sending and receiving endpoint.

---
# Egress: allow-frontend-egress-to-backend
# Permits frontend pods to initiate connections to backend pods.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-frontend-egress-to-backend
  namespace: employee-portal
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
  annotations:
    description: "Allows frontend pods to make egress connections to backend pods on port 8080."
spec:
  description: "Allow egress from frontend pods to backend pods on port 8080"
  endpointSelector:
    matchLabels:
      app: frontend
  egress:
    - toEndpoints:
        - matchLabels:
            app: backend
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP

---
# Egress: allow-backend-egress-to-postgres
# Permits backend pods to initiate connections to postgres pods.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-backend-egress-to-postgres
  namespace: employee-portal
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
  annotations:
    description: "Allows backend pods to make egress connections to postgres pods on port 5432."
spec:
  description: "Allow egress from backend pods to postgres pods on port 5432"
  endpointSelector:
    matchLabels:
      app: backend
  egress:
    - toEndpoints:
        - matchLabels:
            app: postgres
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

---
# ──────────────────────────────────────────────────────────────────────────────
# Standard Kubernetes NetworkPolicies (complement the CiliumNetworkPolicies)
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: employee-portal
  labels:
    app.kubernetes.io/name: employee-portal
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-backend
  namespace: employee-portal
  labels:
    app.kubernetes.io/name: employee-portal
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8080

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-postgres
  namespace: employee-portal
  labels:
    app.kubernetes.io/name: employee-portal
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 5432
