---
# ClusterSPIFFEID for employee-portal frontend
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: employee-portal-frontend
  labels:
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
spec:
  spiffeIDTemplate: "spiffe://ipp-platform.local/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
  podSelector:
    matchLabels:
      app: frontend
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: employee-portal
  ttl: 1h

