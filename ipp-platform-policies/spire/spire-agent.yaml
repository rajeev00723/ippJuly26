---
# ServiceAccount for SPIRE Agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app: spire-agent
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform

---
# ClusterRole for SPIRE Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-agent-cluster-role
  labels:
    app: spire-agent
    app.kubernetes.io/managed-by: ipp-platform
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]

---
# ClusterRoleBinding for SPIRE Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-agent-cluster-role-binding
  labels:
    app: spire-agent
    app.kubernetes.io/managed-by: ipp-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-agent-cluster-role
subjects:
  - kind: ServiceAccount
    name: spire-agent
    namespace: spire

---
# ConfigMap for SPIRE Agent configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app: spire-agent
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
data:
  agent.conf: |
    agent {
      data_dir = "/run/spire"
      log_level = "DEBUG"
      log_format = "text"
      server_address = "spire-server"
      server_port = "8081"
      socket_path = "/run/spire/sockets/agent.sock"
      trust_bundle_path = "/run/spire/bundle/bundle.crt"
      trust_domain = "ipp-platform.local"
    }

    plugins {
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "kind-ipp-local"
          token_path = "/var/run/secrets/tokens/spire-agent"
        }
      }

      KeyManager "memory" {
        plugin_data {}
      }

      WorkloadAttestor "k8s" {
        plugin_data {
          skip_kubelet_verification = true
          node_name_env = "MY_NODE_NAME"
        }
      }
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8080"
      live_path = "/live"
      ready_path = "/ready"
    }

---
# DaemonSet for SPIRE Agent
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app: spire-agent
    app.kubernetes.io/managed-by: ipp-platform
    environment: demo
    owner: platform-team
    cost-center: platform
spec:
  selector:
    matchLabels:
      app: spire-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: spire-agent
        app.kubernetes.io/managed-by: ipp-platform
        environment: demo
        owner: platform-team
        cost-center: platform
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: spire-agent

      initContainers:
        - name: init-bundle
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              # Wait for SPIRE Server to populate the bundle ConfigMap
              echo "Waiting for SPIRE bundle to be available..."
              for i in $(seq 1 60); do
                if [ -f /run/spire/bundle/bundle.crt ] && [ -s /run/spire/bundle/bundle.crt ]; then
                  echo "Bundle found, proceeding"
                  exit 0
                fi
                echo "Attempt $i: Bundle not yet available, waiting 5s..."
                sleep 5
              done
              echo "WARNING: Proceeding without bundle (server may not have initialized yet)"
              exit 0
          volumeMounts:
            - name: spire-bundle
              mountPath: /run/spire/bundle
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

      containers:
        - name: spire-agent
          image: ghcr.io/spiffe/spire-agent:1.9.0
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /run/spire/config/agent.conf

          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          ports:
            - name: health
              containerPort: 8080
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-bundle
              mountPath: /run/spire/bundle
              readOnly: true
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
            - name: spire-token
              mountPath: /var/run/secrets/tokens

      volumes:
        - name: spire-config
          configMap:
            name: spire-agent
        - name: spire-bundle
          configMap:
            name: spire-bundle
            optional: true
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        - name: spire-token
          projected:
            sources:
              - serviceAccountToken:
                  path: spire-agent
                  expirationSeconds: 7200
                  audience: spire-server
