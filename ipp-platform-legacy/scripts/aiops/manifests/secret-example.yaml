## AIOps Engine — Secret EXAMPLE
## Copy this file to secret.yaml (gitignored) and fill in real values.
## DO NOT commit real secrets to Git.
---
apiVersion: v1
kind: Secret
metadata:
  name: aiops-secrets
  namespace: aiops
  labels:
    app: aiops-engine
    app.kubernetes.io/part-of: idp-platform
type: Opaque
stringData:
  # Anthropic API key — if set, agents use Claude instead of local Ollama.
  # Leave empty to keep using the local LLM (Ollama).
  ANTHROPIC_API_KEY: ""
  # LangSmith API key — leave empty to disable tracing
  LANGCHAIN_API_KEY: ""
  # ArgoCD admin token (if ArgoCD requires auth)
  ARGOCD_AUTH_TOKEN: ""
