apiVersion: v1
kind: Namespace
metadata:
  name: gitea
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: gitea
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
  labels:
    app: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.22.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # Server
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__server__ROOT_URL
              value: "http://gitea.ipp.local/"
            - name: GITEA__server__DISABLE_SSH
              value: "true"
            # Database
            - name: GITEA__database__DB_TYPE
              value: "sqlite3"
            - name: GITEA__database__PATH
              value: "/data/gitea/gitea.db"
            # Security
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__security__SECRET_KEY
              value: "ipp-demo-secret-key-local-2024"
            - name: GITEA__security__INTERNAL_TOKEN
              value: "ipp-demo-internal-token-local-2024"
            # Service
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "false"
            - name: GITEA__service__REQUIRE_SIGNIN_VIEW
              value: "false"
            - name: GITEA__repository__DEFAULT_BRANCH
              value: "main"
            # Log
            - name: GITEA__log__LEVEL
              value: "Warn"
            # Admin user created on first start
            - name: GITEA_ADMIN_USER
              value: "gitea-admin"
            - name: GITEA_ADMIN_PASSWORD
              value: "admin-demo-2024"
            - name: GITEA_ADMIN_EMAIL
              value: "admin@ipp.local"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitea
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea-ingress
  namespace: gitea
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: gitea.ipp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitea
                port:
                  number: 3000
