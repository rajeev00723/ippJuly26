name: IPP Documentation Lint
# Migrated from: .github/workflows/docs-lint.yml
# Expanded to watch all 6 ipp-platform-* repo doc paths.

on:
  push:
    paths:
      - 'docs/**/*.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CHANGELOG.md'
      - 'ipp-platform-*/README.md'
      - 'ipp-platform-*/docs/**/*.md'
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'README.md'
      - 'ipp-platform-*/README.md'
      - 'ipp-platform-*/docs/**/*.md'

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            SECURITY.md
            CHANGELOG.md
            docs/**/*.md
            ipp-platform-*/README.md
            ipp-platform-*/docs/**/*.md
            ipp-platform-*/scripts/README.md
            ipp-platform-*/conftest/README.md
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false,
              "MD024": false
            }
