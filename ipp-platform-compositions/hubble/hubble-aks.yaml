# Hubble observability stack for AKS clusters provisioned with Cilium CNI.
#
# Apply against the AKS cluster kubeconfig AFTER the cluster is READY:
#
#   kubectl get secret <claim-name>-kubeconfig -n crossplane-system \
#     --context kind-ipp-local -o jsonpath='{.data.kubeconfig}' \
#     | base64 -d > /tmp/aks-kubeconfig.yaml
#
#   # 1. Enable Hubble in cilium-config and restart the daemonset
#   kubectl patch configmap cilium-config -n kube-system \
#     --kubeconfig /tmp/aks-kubeconfig.yaml --type merge -p '{
#       "data": {
#         "enable-hubble": "true",
#         "hubble-listen-address": ":4244",
#         "hubble-socket-path": "/var/run/cilium/hubble.sock",
#         "hubble-metrics-server": ":9091",
#         "hubble-metrics": "drop;tcp;flow;port-distribution;icmp;http"
#       }
#     }'
#   kubectl rollout restart daemonset/cilium -n kube-system \
#     --kubeconfig /tmp/aks-kubeconfig.yaml
#
#   # 2. Apply this manifest
#   kubectl apply -f hubble-aks.yaml --kubeconfig /tmp/aks-kubeconfig.yaml
#
# Azure ships Cilium without Hubble enabled. The ConfigMap patch above enables
# the Hubble agent; these manifests deploy relay + UI to surface flows.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hubble-ui-nginx
  namespace: kube-system
data:
  nginx.conf: |
    server {
        listen 8080;
        server_name localhost;
        root /app;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
        location /api {
            proxy_pass http://localhost:8090;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble-relay
  namespace: kube-system
  labels:
    app: hubble-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hubble-relay
  template:
    metadata:
      labels:
        app: hubble-relay
    spec:
      containers:
      - name: hubble-relay
        image: quay.io/cilium/hubble-relay:v1.18.9
        command:
        - hubble-relay
        args:
        - serve
        - --peer-service=unix:///var/run/cilium/hubble.sock
        - --listen-address=:4245
        - --disable-client-tls
        - --disable-server-tls
        ports:
        - containerPort: 4245
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: hubble-sock
          mountPath: /var/run/cilium
      volumes:
      - name: hubble-sock
        hostPath:
          path: /var/run/cilium
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - operator: Exists
---
apiVersion: v1
kind: Service
metadata:
  name: hubble-relay
  namespace: kube-system
spec:
  selector:
    app: hubble-relay
  ports:
  - port: 4245
    targetPort: 4245
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble-ui
  namespace: kube-system
  labels:
    app: hubble-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hubble-ui
  template:
    metadata:
      labels:
        app: hubble-ui
    spec:
      containers:
      - name: frontend
        image: quay.io/cilium/hubble-ui:v0.13.1
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
      - name: backend
        image: quay.io/cilium/hubble-ui-backend:v0.13.1
        ports:
        - containerPort: 8090
        env:
        - name: EVENTS_SERVER_PORT
          value: "8090"
        - name: FLOWS_API_ADDR
          value: "hubble-relay.kube-system.svc.cluster.local:4245"
        - name: TLS_TO_RELAY_ENABLED
          value: "false"
      volumes:
      - name: nginx-conf
        configMap:
          name: hubble-ui-nginx
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: hubble-ui
  namespace: kube-system
spec:
  selector:
    app: hubble-ui
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
# LoadBalancer exposes Hubble UI externally from AKS.
# After applying, get the EXTERNAL-IP and update /etc/hosts if needed:
#   kubectl get svc hubble-ui-lb -n kube-system --kubeconfig /tmp/aks-kubeconfig.yaml
apiVersion: v1
kind: Service
metadata:
  name: hubble-ui-lb
  namespace: kube-system
spec:
  type: LoadBalancer
  selector:
    app: hubble-ui
  ports:
  - port: 80
    targetPort: 8080
