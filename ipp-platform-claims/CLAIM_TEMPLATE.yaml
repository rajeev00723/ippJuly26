# IPP Claim Template
# Copy this file, fill in all required fields, and open a PR.
# @ipp-automation-bot will validate and merge on Conftest policy pass.
#
# File naming convention:
#   claim-{resource-type}-{bu-slug}-{env}-{sequence}.yaml
#   e.g. claim-threetierapp-logistics-eu-dev-001.yaml
#
# Place the file in the correct directory:
#   AppBox:  appbox/{env}/{bu-name}/
#   Cluster: clusters/{env}/{bu-name}/
#   VM:      vms/{env}/{bu-name}/
#   DB:      databases/{env}/{bu-name}/
#   Network: networks/{env}/{bu-name}/

apiVersion: platform.ipp.dhl.com/v1alpha1
kind: IPPAppBoxClaim                   # Change to IPPClusterClaim / IPPVirtualMachineClaim as needed
metadata:
  name: ""                             # REQUIRED: unique name for this claim
  namespace: ipp-appbox-dev            # REQUIRED: must match environment
  labels:
    app.kubernetes.io/name: ""
    app.kubernetes.io/part-of: ipp-platform
    app.kubernetes.io/managed-by: ipp-automation-bot
    platform.ipp.dhl.com/team: ""
    platform.ipp.dhl.com/environment: dev   # dev | staging | prod
    platform.ipp.dhl.com/business-unit: ""
    platform.ipp.dhl.com/resource-type: appbox
  annotations:
    # ALL of these annotations are required — Conftest will reject the PR if any are missing
    ipp.dhl.com/request-id: ""         # REQUIRED: auto-generated by IPP portal, or set manually
    ipp.dhl.com/business-unit: ""      # REQUIRED: e.g. "logistics-eu"
    ipp.dhl.com/cost-center: ""        # REQUIRED: e.g. "CC-1234"
    ipp.dhl.com/environment: ""        # REQUIRED: dev | staging | prod
    ipp.dhl.com/requested-by: ""       # REQUIRED: email of requesting engineer
spec:
  parameters:
    namespace: ""                      # REQUIRED

    frontend:
      image: ""                        # REQUIRED: e.g. ipp-platform/my-frontend:v1.0.0
      replicas: 2

    backend:
      image: ""                        # REQUIRED: e.g. ipp-platform/my-backend:v1.0.0
      replicas: 2

    database:
      storageGB: 10
      version: "16"

    ingress:
      host: ""                         # REQUIRED: e.g. myapp.ipp.local

    owner:
      team: ""                         # REQUIRED
      costCenter: ""                   # REQUIRED
      environment: dev                 # REQUIRED: dev | staging | prod
      businessUnit: ""
      requestedBy: ""
      requestId: ""

  compositionSelector:
    matchLabels:
      platform.ipp.dhl.com/composition: ipp-composition-appbox-threetierapp

  writeConnectionSecretToRef:
    name: ""                           # REQUIRED: e.g. my-app-connection
