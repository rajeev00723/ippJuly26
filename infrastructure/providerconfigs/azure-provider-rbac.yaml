---
# Grants all Upbound Azure provider pods read/write access to providerconfigs.azure.upbound.io
# and providerconfigusages.azure.upbound.io.
#
# Why this is needed: when provider-family-azure installs normally via the Crossplane package
# manager it creates these ClusterRoles automatically. If the package fails to reach Healthy
# (e.g. lock DAG conflict with function-patch-and-transform) the pod never starts, the CRDs
# are applied manually as a fallback, but the matching RBAC rules are never created — so every
# managed resource logs:
#   "cannot get referenced ProviderConfig: no matches for kind ProviderConfig in version
#    azure.upbound.io/v1beta1"
#
# Apply: kubectl apply -f infrastructure/providerconfigs/azure-provider-rbac.yaml
# Idempotent — safe to re-run.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane:provider:azure-providerconfig-access
rules:
  - apiGroups: ["azure.upbound.io"]
    resources: ["providerconfigs", "providerconfigusages"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["azure.upbound.io"]
    resources: ["providerconfigs/status", "providerconfigusages/status"]
    verbs: ["get", "update", "patch"]
