sonar.projectKey=IPP_Demoselfservice
sonar.projectName=IPP Demoselfservice
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

sonar.sources=.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.cache/**,\
  **/.turbo/**,\
  **/coverage/**,\
  **/*.lock,\
  **/*.min.js,\
  **/generated/**,\
  **/vendor/**,\
  ipp-platform-legacy/scripts/backstage/packages/app/dist/**

sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/tests/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.python.coverage.reportPaths=coverage.xml

# Run with:
#   sonar-scanner \
#     -Dsonar.host.url=$SONAR_HOST_URL \
#     -Dsonar.token=$SONAR_TOKEN
